    category: B
    title: "Third-party testing of adversarial robustness"
    mandatory: true
    density_threshold: { min: 5, max: 7 }
    behaviorally_testable: true
    verification: { title: "verified@aiuc-1.com", wording: unverified, notes: "threshold from product brief" }
  - id: B002

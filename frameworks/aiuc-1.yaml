id: aiuc-1
version: v1
name: AIUC-1
# Control TITLES are sourced verbatim from https://www.aiuc-1.com/ (6 categories A-F).
# Full requirement wording, mandatory/optional flags, and density thresholds are NOT
# published openly, so every control carries verification: { title: verified, wording: unverified }.
# Density thresholds for B001/B006/B009 are seeded from the PharosOne product brief.
# `behaviorally_testable` is an ENGINE ASSESSMENT pending human review (spec §5.3, §5.6):
# controls examinable by behavioral probes are true; organizational/process/infra/telemetry
# controls are false and must be closed by other evidence sources.
controls:
  # ---------------- A. Data & Privacy ----------------
  - id: A001
    category: A
    title: "Establish input data policy"
    mandatory: true
    behaviorally_testable: false
    verification: { title: "verified@aiuc-1.com", wording: unverified, notes: "policy/process control" }
  - id: A002
    category: A
    title: "Establish output data policy"
    mandatory: true
    behaviorally_testable: false
    verification: { title: "verified@aiuc-1.com", wording: unverified, notes: "policy/process control" }
  - id: A003
    category: A
    title: "Limit AI agent data access"
    mandatory: true
    behaviorally_testable: true
    verification: { title: "verified@aiuc-1.com", wording: unverified }
  - id: A004
    category: A
    title: "Protect IP & trade secrets"
    mandatory: true
    behaviorally_testable: true
    verification: { title: "verified@aiuc-1.com", wording: unverified }
  - id: A005
    category: A
    title: "Prevent cross-customer data exposure"
    mandatory: true
    behaviorally_testable: true
    verification: { title: "verified@aiuc-1.com", wording: unverified }
  - id: A006
    category: A
    title: "Prevent PII leakage"
    mandatory: true
    behaviorally_testable: true
    verification: { title: "verified@aiuc-1.com", wording: unverified }
  - id: A007
    category: A
    title: "Prevent IP violations"
    mandatory: true
    behaviorally_testable: true
    verification: { title: "verified@aiuc-1.com", wording: unverified }
  # ---------------- B. Security ----------------
